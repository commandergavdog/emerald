  <body>
    <div id="root"></div>
    <script>
      // Restore routes redirected by public/404.html so BrowserRouter receives the
      // original path instead of the temporary GitHub Pages fallback query string.
      (function restoreGitHubPagesRoute(location) {
        if (!location.search || location.search[1] !== '/') {
          return;
        }

        var decodedPath = location.search
          .slice(1)
          .split('&')
          .map(function (segment) {
            return segment.replace(/~and~/g, '&');
          })
          .join('?');

        window.history.replaceState(null, '', decodedPath + location.hash);
      })(window.location);
    </script>
